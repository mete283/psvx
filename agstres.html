<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ağ Performans Analizörü</title>
    <style>
        :root { --mor: #8b5cf6; --koyu: #06040a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--koyu); color: #cbd5e1; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .panel { background: #0f0b1a; border: 1px solid #2e1065; padding: 30px; border-radius: 20px; width: 100%; max-width: 600px; box-shadow: 0 0 20px rgba(139, 92, 246, 0.2); }
        h2 { color: var(--mor); text-align: center; text-transform: uppercase; letter-spacing: 2px; font-size: 16px; margin-bottom: 20px; }
        
        .status-bar { width: 100%; height: 10px; background: #1e1b4b; border-radius: 5px; overflow: hidden; margin: 20px 0; }
        #progress { width: 0%; height: 100%; background: var(--mor); transition: width 0.3s; }
        
        button { width: 100%; background: var(--mor); color: white; border: none; padding: 15px; border-radius: 50px; cursor: pointer; font-weight: bold; }
        #log { margin-top: 20px; font-size: 13px; color: #94a3b8; background: #0a0712; padding: 15px; border-radius: 10px; height: 180px; overflow-y: auto; border: 1px solid #2e1065; }
    </style>
</head>
<body>

<div class="panel">
    <h2>AĞ PERFORMANS TARAMA</h2>
    <button id="startBtn" onclick="analizEt()">BAŞLAT</button>
    
    <div class="status-bar"><div id="progress"></div></div>
    <div id="log">İstatistikler için testi başlatın.</div>
</div>

<script>
    async function analizEt() {
        const log = document.getElementById('log');
        const progress = document.getElementById('progress');
        const btn = document.getElementById('startBtn');
        
        btn.disabled = true;
        log.innerHTML = "Gerçek veriler çekiliyor (RTT Ölçümü)...<br>";
        
        let toplamSure = 0;
        const testSayisi = 5;

        for (let i = 1; i <= testSayisi; i++) {
            const start = performance.now();
            try {
                // cache: 'no-cache' kullanarak gerçek bir sunucu yanıtı alıyoruz
                await fetch('https://www.google.com', { mode: 'no-cors', cache: 'no-cache' });
                const end = performance.now();
                
                const ms = Math.round(end - start);
                toplamSure += ms;
                
                progress.style.width = (i * (100 / testSayisi)) + "%";
                log.innerHTML += `Sorgu ${i}: ${ms}ms <br>`;
                log.scrollTop = log.scrollHeight;
            } catch (e) {
                log.innerHTML += `Sorgu ${i}: BAĞLANTI HATASI <br>`;
            }
            await new Promise(r => setTimeout(r, 400));
        }
        
        const ortalama = Math.round(toplamSure / testSayisi);
        log.innerHTML += `<br><b>Ortalama Gecikme: ${ortalama}ms</b>`;
        log.innerHTML += `<br><b>Durum: ${ortalama < 100 ? 'HIZLI (Stabil)' : 'YAVAŞ (Tıkanıklık Var)'}</b>`;
        btn.disabled = false;
    }
</script>
</body>
</html>
