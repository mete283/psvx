<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Siber İstihbarat | Maksimum Donanım Analizi</title>
    <style>
        :root { --mor: #8b5cf6; --koyu: #06040a; }
        body { background: var(--koyu); color: #cbd5e1; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .panel { background: #0f0b1a; border: 1px solid #2e1065; padding: 30px; border-radius: 20px; width: 100%; max-width: 800px; }
        h2 { color: var(--mor); text-align: center; text-transform: uppercase; margin-bottom: 20px; font-size: 18px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .info-card { background: #130f24; padding: 12px; border-radius: 8px; border-left: 3px solid var(--mor); }
        .label { color: var(--mor); font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .value { color: #fff; font-size: 13px; margin-top: 3px; word-break: break-all; }
    </style>
</head>
<body>

<div class="panel">
    <h2>Telefon Hakkında</h2>
    <div class="grid" id="info-area"></div>
</div>

  
  
<script>
    function ekle(etiket, veri) {
        document.getElementById('info-area').innerHTML += `<div class="info-card"><div class="label">${etiket}</div><div class="value">${veri}</div></div>`;
    }

          // 1. Marka ve Model Tahmini (User-Agent'tan ayrıştırma)
        const ua = navigator.userAgent;
        let model = "Bilinmiyor";
        
        if (/iPhone/.test(ua)) model = "Apple iPhone";
        else if (/Samsung/.test(ua)) model = "Samsung Cihaz";
        else if (/Pixel/.test(ua)) model = "Google Pixel";
        else if (/Android/.test(ua)) model = "Android Cihaz";
        
        ekle("Tahmini Cihaz Grubu", model);
        ekle("User Agent (Ham Veri)", ua.substring(0, 50) + "...");


    async function analizEt() {
        // 1. Temel Sistem Bilgileri
        ekle("Platform", navigator.platform);
        ekle("User Agent", navigator.userAgent);
        ekle("Dil", navigator.language);
        
        // 2. Donanım Bilgileri
        ekle("CPU Çekirdek", navigator.hardwareConcurrency || "Bilinmiyor");
        ekle("RAM Kapasitesi", (navigator.deviceMemory || "Bilinmiyor") + " GB");
        
        // 3. Ekran ve Grafik (Ekran Yenileme Hızı dahil)
        ekle("Çözünürlük", screen.width + "x" + screen.height);
        ekle("Renk Derinliği", screen.colorDepth + " bit");
        
        // 4. Batarya İstihbaratı (API Desteği Olan Cihazlarda)
        if (navigator.getBattery) {
            const batarya = await navigator.getBattery();
            ekle("Batarya Seviyesi", Math.round(batarya.level * 100) + "%");
            ekle("Şarj Durumu", batarya.charging ? "Şarj Oluyor" : "Deşarj Oluyor");
        } else {
            ekle("Batarya", "API Desteklenmiyor");
        }

      
      // Servis Sağlayıcıyı çeken ve ekrana basan fonksiyon
async function servisiGetir() {
    try {
        // IP bilgisi ve ISP (Servis Sağlayıcı) bilgilerini çeken ücretsiz API
        const response = await fetch('https://ipinfo.io/json');
        const data = await response.json();
        
        // Veriyi sayfaya ekle
        ekle("Servis Sağlayıcı (ISP)", data.org || "Bilinmiyor");
        ekle("Açık IP Adresi", data.ip || "Algılanamadı");
        ekle("Konum (Şehir)", data.city || "Bilinmiyor");
    } catch (error) {
        console.error("Servis sağlayıcı bilgisi alınamadı:", error);
        ekle("Servis Sağlayıcı (ISP)", "Erişim Engellendi / Hata");
    }
}

// Bunu analizEt fonksiyonunun en altında çağır
// analizEt(); -> altındaki kodların en sonuna şu satırı ekle:
servisiGetir();

      
      
      async function parseUserAgent() {
    let model = "Algılanamadı";

    // 1. Yeni nesil "Client Hints" yöntemini dene (Eğer tarayıcı izin verirse)
    if (navigator.userAgentData) {
        const uaData = await navigator.userAgentData.getHighEntropyValues(['model', 'platformVersion']);
        model = uaData.model || "Bilinmiyor";
    } 
    // 2. Eğer desteklenmiyorsa, mevcut User-Agent içinde "Build" etiketini ara
    else {
        const ua = navigator.userAgent;
        const buildMatch = ua.match(/\(([^)]+)\)/);
        if (buildMatch) {
            const parts = buildMatch[1].split('; ');
            // Vivo cihazlar için "V" ile başlayan veya "Build" öncesi ifadeyi bul
            model = parts.find(p => p.startsWith('V') && p.length > 3) || parts[parts.length - 1];
        }
    }

    ekle("Cihaz Modeli", model);
}

// Bunu analizEt içerisinde çağır
parseUserAgent();

      
        // 1. Android Sürümünü Çekme (Regex)
    const androidMatch = ua.match(/Android\s([0-9\.]+)/);
    if (androidMatch) {
        androidVersiyon = androidMatch[1];
    }
      
ekle("Android Sürümü", androidVersiyon);

      
      
      
      
              // 2. Ekran Yenileme Hızı (Hz) Tespiti
        // Cihazın ekranının kaç Hz olduğunu hesaplamak için 1 saniyelik döngü ölçümü
        let frames = 0;
        let start = performance.now();
        
        function checkHz(now) {
            frames++;
            if (now - start < 1000) {
                requestAnimationFrame(checkHz);
            } else {
                ekle("Ekran Yenileme Hızı", frames + " Hz (Yaklaşık)");
            }
        }
        requestAnimationFrame(checkHz);


        // 5. Ağ Durumu
        ekle("Çevrimiçi", navigator.onLine ? "Evet" : "Hayır");
        ekle("Bağlantı Türü", navigator.connection ? navigator.connection.effectiveType : "Desteklenmiyor");
        
        // 6. Zaman ve Bölge
        ekle("Zaman Dilimi", Intl.DateTimeFormat().resolvedOptions().timeZone);
        
        // 7. Tarayıcı İleri Seviye Verileri
        ekle("GPU Renderer", (() => {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl');
            const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
            return gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
        })());
    }

    window.onload = analizEt;
</script> 
</body>
</html>
