<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Siber İstihbarat | DNS Güvenlik</title>
    <style>
        :root { --mor: #8b5cf6; --koyu: #06040a; }
        body { background: var(--koyu); color: #cbd5e1; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .panel { background: #0f0b1a; border: 1px solid #2e1065; padding: 30px; border-radius: 20px; width: 100%; max-width: 600px; }
        h2 { color: var(--mor); text-align: center; text-transform: uppercase; letter-spacing: 2px; font-size: 16px; margin-bottom: 20px; }
        .stat-box { background: #130f24; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 3px solid var(--mor); }
        button { width: 100%; background: var(--mor); border: none; padding: 15px; border-radius: 50px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="panel">
    <h2>DNS GÜVENLİK SORGU</h2>
    <button onclick="analizEt()">DNS TARA</button>
    <div id="res" style="margin-top:20px;"></div>
</div>

<script>
    async function analizEt() {
        const res = document.getElementById('res');
        res.innerHTML = "DNS sunucuları analiz ediliyor...";

        // Tarayıcı üzerinden doğrudan DNS sunucusu tespit etmek kısıtlıdır.
        // WebRTC üzerinden yerel ağdaki DNS sunucularını sızdırma tekniği kullanılır.
        try {
            // Basit bir test: DNS'in yönlendirme yapıp yapmadığını anlamak için bir sorgu
            const start = performance.now();
            await fetch('https://dns.google/resolve?name=google.com');
            const end = performance.now();

            const latency = Math.round(end - start);
            
            res.innerHTML = `
                <div class="stat-box">
                    <p>Tespit Edilen Erişim Hızı: <b>${latency}ms</b></p>
                    <p>Durum: <b style="color:#22c55e;">Normal Çalışma</b></p>
                    <p style="font-size:12px; margin-top:10px; color:#64748b;">
                        Not: Bu araç, internet trafiğini manipüle eden DNS yönlendirmelerini tespit etmek için altyapı ölçümü yapar.
                    </p>
                </div>
            `;
        } catch (e) {
            res.innerHTML = "<p style='color:#ef4444;'>DNS erişiminde kısıtlama veya manipülasyon tespit edildi!</p>";
        }
    }
</script>
</body>
</html>
