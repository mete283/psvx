<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSVX Panel</title>
    <style>
        :root { 
            --mor: #a855f7; 
            --koyu: #05030a; 
            --neon: 0 0 18px rgba(168, 85, 247, 0.85);
            --neon-border: 0 0 8px rgba(168, 85, 247, 0.5);
        }
        
        /* Mavi Efekt Filtreleri Temizliği */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            outline: none; 
            border: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        body { 
            background: var(--koyu); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            padding: 30px; 
        }

        header { 
            display: flex; 
            align-items: center; 
            margin-bottom: 40px; 
        }
        
        .baslik { 
            font-size: 24px; 
            font-weight: bold; 
            letter-spacing: 0.5px;
        }
        .psvx { 
            color: var(--mor); 
            text-shadow: var(--neon); 
        }

        /* ARAMA GRUBU */
        .search-container { 
            display: flex;
            align-items: center;
            width: 100%; 
            max-width: 600px; 
            margin: 0 auto 40px auto; 
            background: #0f0b1a; 
            border: 1px solid var(--mor); 
            border-radius: 50px; 
            padding: 0 25px;
            box-shadow: var(--neon-border);
            transition: all 0.3s ease;
        }
        .search-container:focus-within {
            box-shadow: var(--neon);
            border-color: white;
        }

        /* KUSURSUZ GEOMETRİK BÜYÜTEÇ SİMGESİ */
        .cizim-buyutec {
            width: 14px; 
            height: 14px; 
            border: 2.5px solid var(--mor); 
            border-radius: 50%;
            position: relative;
            flex-shrink: 0;
            filter: drop-shadow(0 0 4px var(--mor));
            margin-right: 15px;
            transform: rotate(-45deg); /* Sapın tam köşeden çıkması için döndürme açısı */
        }
        .cizim-buyutec::after {
            content: ''; 
            position: absolute; 
            bottom: -8px; 
            left: 3.5px; 
            width: 2.5px; 
            height: 8px;
            background: var(--mor); 
            border-radius: 0 0 2px 2px;
        }

        .search-box { 
            width: 100%; 
            padding: 15px 0; 
            background: transparent;
            color: white; 
            font-size: 14px;
        }

        /* SINIFLANDIRMALAR VE BUTONLAR */
        .kategori-konteyner {
            max-width: 600px; 
            margin: 0 auto;
        }
        .kategori-baslik { 
            color: var(--mor); 
            margin: 35px 0 15px 0; 
            font-size: 13px; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            text-shadow: var(--neon); 
            padding-left: 5px; 
        }
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
        }
        
        .modul-btn { 
            background: #0a0712; 
            border: 1px solid #2e1065; 
            padding: 18px; 
            border-radius: 50px; 
            color: white; 
            cursor: pointer; 
            font-weight: 500; 
            letter-spacing: 0.5px;
            font-size: 14px;
            transition: all 0.3s ease;
            text-align: center;
        }
        .modul-btn:hover { 
            border-color: var(--mor); 
            box-shadow: var(--neon); 
            background: #1a1230; 
        }
        .modul-btn:active {
            background: var(--mor);
            box-shadow: var(--neon);
        }
    </style>
</head>
<body>

    <div class="baslik"><span class="psvx">PSVX</span> Panel</div>
</header>

    <div class="cizim-buyutec"></div>

</div>

<script>
    const searchInput = document.querySelector('.search-box');
    searchInput.addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase();
        document.querySelectorAll('.modul-btn').forEach(btn => {
            const matches = btn.innerText.toLowerCase().includes(val);
            btn.style.display = matches ? 'block' : 'none';
        });
    });
</script>

</html>
