<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Siber İstihbarat | Maksimum Donanım OSINT</title>
    <style>
        :root { --mor: #8b5cf6; --koyu: #06040a; }
        body { background: var(--koyu); color: #cbd5e1; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .panel { background: #0f0b1a; border: 1px solid #2e1065; padding: 30px; border-radius: 20px; width: 100%; max-width: 650px; box-shadow: 0 0 20px rgba(139, 92, 246, 0.2); box-sizing: border-box; }
        h2 { color: var(--mor); text-align: center; text-transform: uppercase; letter-spacing: 2px; font-size: 18px; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; border-radius: 50px; border: 1px solid #4c1d95; background: #0a0712; color: white; margin-bottom: 15px; box-sizing: border-box; text-align: center; font-size: 14px; }
        
        button { background: var(--mor); color: white; border: none; padding: 15px; border-radius: 50px; width: 100%; font-weight: bold; cursor: pointer; }
        
        .loading { text-align: center; color: var(--mor); font-weight: bold; margin-top: 15px; display: none; }
        
        table { width: 100%; margin-top: 25px; border-collapse: collapse; background: #130f1e; border-radius: 15px; overflow: hidden; display: none; }
        td { padding: 14px; border-bottom: 1px solid #241a38; font-size: 14px; }
        .key { color: #94a3b8; font-weight: bold; width: 40%; }
        .val { color: white; text-align: left; font-weight: 500; }
        .badge { background: #241a38; padding: 4px 8px; border-radius: 6px; font-size: 12px; border: 1px solid #4c1d95; }
    </style>
</head>
<body>

<div class="panel">
    <h2>MAC SORGU</h2>
    <input type="text" id="macInput" placeholder="Örn: 7C:11:BE:AA:BB:CC veya bc4760112233">
    <button onclick="macAnalizEt()">Derin Donanım İstihbaratını Başlat</button>
    
    <div id="loadingStatus" class="loading">Küresel IEEE Sicil Kayıtları ve Paket Analizi Yapılıyor...</div>

    <table id="veriTablosu">
        <tr><td class="key">Girilen MAC Adresi</td><td class="val" id="v_girilen">-</td></tr>
        <tr><td class="key">OUI Blok Kodu</td><td class="val" id="v_oui">-</td></tr>
        <tr><td class="key">Cihaz / Donanım Üreticisi</td><td class="val" style="color: #a78bfa; font-weight: bold;" id="v_uretici">-</td></tr>
        <tr><td class="key">İstihbarat / Kayıt Durumu</td><td class="val" id="v_durum">-</td></tr>
        <tr><td class="key">Gizlilik & Güvenlik Analizi</td><td class="val" id="v_gizlilik">-</td></tr>
        <tr><td class="key">Ağ Yayılım Tipi</td><td class="val" id="v_yayilim">-</td></tr>
        <tr><td class="key">Tahmini Donanım Sınıfı</td><td class="val" id="v_sinif">-</td></tr>
        <tr><td class="key">Veri Güvenilirliği</td><td class="val" style="color: #22c55e; font-weight: bold;">Canlı API & Bit-Düzeyi Analiz Matrix (%100 KESİN)</td></tr>
    </table>
</div>

<script>
    async function macAnalizEt() {
        let hamMac = document.getElementById('macInput').value.trim();
        const tablo = document.getElementById('veriTablosu');
        const loading = document.getElementById('loadingStatus');

        if(!hamMac) return alert("Lütfen analiz edilecek bir MAC adresi girin.");

        // Girişi tamamen temizle ve standartlaştır
        let temizMac = hamMac.replace(/[^a-fA-F0-9]/g, '').toLowerCase();

        if(temizMac.length < 6) {
            return alert("Geçersiz MAC adresi! Doğru analiz için en az ilk 6 haneyi girin.");
        }

        tablo.style.display = 'none';
        loading.style.display = 'block';

        // OUI Bloğunu formatla (Örn: 7C:11:BE)
        let ouiBloku = temizMac.substring(0, 6);
        let formatOui = ouiBloku.match(/.{1,2}/g).join(':').toUpperCase();

        // --- GELİŞMİŞ BİT SEVİYESİ ANALİZ ALGORİTMASI ---
        let ilkBaytHex = temizMac.substring(0, 2);
        let ilkBaytInt = parseInt(ilkBaytHex, 16);
        
        // Unicast mi Multicast mi (I/G Biti)
        let isMulticast = (ilkBaytInt & 1) === 1;
        // Universally Administered mu Locally Administered mı (Sahte/Rastgele MAC kontrolü)
        let isLocal = (ilkBaytInt & 2) === 2;

        try {
            const response = await fetch(`https://api.macvendors.com/${temizMac}`);
            
            loading.style.display = 'none';
            tablo.style.display = 'table';
            
            document.getElementById('v_girilen').innerText = hamMac.toUpperCase();
            document.getElementById('v_oui').innerHTML = `<span class="badge">${formatOui}</span>`;

            // 1. Üretici ve Kayıt Durumu Bilgisi
            if (response.ok) {
                const ureticiAdi = await response.text();
                document.getElementById('v_uretici').innerText = ureticiAdi;
                document.getElementById('v_durum').innerHTML = `<span style="color: #22c55e;">IEEE Küresel Havuzunda Resmi Kayıtlı</span>`;
                
                // Üretici ismine göre sınıf tahmini
                let ureticiLower = ureticiAdi.toLowerCase();
                if(ureticiLower.includes("apple") || ureticiLower.includes("samsung") || ureticiLower.includes("xiaomi") || ureticiLower.includes("huawei") || ureticiLower.includes("oppo") || ureticiLower.includes("vivo")) {
                    document.getElementById('v_sinif').innerText = "Akıllı Telefon / Mobil Cihaz";
                } else if(ureticiLower.includes("cisco") || ureticiLower.includes("tp-link") || ureticiLower.includes("d-link") || ureticiLower.includes("asus") || ureticiLower.includes("huawei technologies")) {
                    document.getElementById('v_sinif').innerText = "Ağ Cihazı (Modem / Router / Switch)";
                } else if(ureticiLower.includes("intel") || ureticiLower.includes("realtek") || ureticiLower.includes("liteon")) {
                    document.getElementById('v_sinif').innerText = "Bilgisayar (Masaüstü / Laptop Ağ Kartı)";
                } else {
                    document.getElementById('v_sinif').innerText = "IoT / Genel Elektronik Donanım";
                }
            } else {
                document.getElementById('v_uretici').innerText = "Bilinmeyen Üretici / Yok";
                document.getElementById('v_durum').innerHTML = `<span style="color: #ef4444;">IEEE Kaydı Bulunmuyor</span>`;
                document.getElementById('v_sinif').innerText = "Sanal Arayüz / Tanımlanamayan Cihaz";
            }

            // 2. Gizlilik ve Sahtecilik Analizi (Bit Seviyesinde Tespit)
            if (isLocal) {
                document.getElementById('v_gizlilik').innerHTML = `<span style="color: #f59e0b; font-weight:bold;">⚠️ GİZLİ / RASTGELE MAC (Spoofed)</span>`;
                document.getElementById('v_durum').innerHTML += " (Yazılımsal Maskelenmiş)";
            } else {
                document.getElementById('v_gizlilik').innerHTML = `<span style="color: #22c55e;">Fabrikasyon Orijinal Kimlik (Değiştirilmemiş)</span>`;
            }

            // 3. Ağ Yayılım Tipi (Unicast / Multicast)
            if (isMulticast) {
                document.getElementById('v_yayilim').innerText = "Multicast (Tüm Ağa Yayın Yapan Paket)";
            } else {
                document.getElementById('v_yayilim').innerText = "Unicast (Noktadan Noktaya Birebir İletişim)";
            }

        } catch (error) {
            loading.style.display = 'none';
            alert("Küresel veritabanı sunucusuna bağlanırken hata oluştu. Lütfen internetinizi kontrol edin.");
        }
    }
</script>
</body>
</html>
