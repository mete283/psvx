<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Siber İstihbarat | Gelişmiş Plaka Analiz</title>
    <style>
        :root { --mor: #8b5cf6; --koyu: #06040a; }
        body { background: var(--koyu); color: #cbd5e1; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .panel { background: #0f0b1a; border: 1px solid #2e1065; padding: 30px; border-radius: 20px; width: 100%; max-width: 600px; box-shadow: 0 0 20px rgba(139, 92, 246, 0.2); }
        h2 { color: var(--mor); text-align: center; text-transform: uppercase; letter-spacing: 2px; font-size: 18px; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; border-radius: 50px; border: 1px solid #4c1d95; background: #0a0712; color: white; margin-bottom: 15px; box-sizing: border-box; text-align: center; }
        button { background: var(--mor); color: white; border: none; padding: 15px; border-radius: 50px; width: 100%; font-weight: bold; cursor: pointer; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; background: #130f1e; border-radius: 15px; overflow: hidden; display: none; }
        td { padding: 12px; border-bottom: 1px solid #241a38; font-size: 14px; }
        .key { color: #94a3b8; font-weight: bold; }
        .val { text-align: right; color: white; }
    </style>
</head>
<body>

<div class="panel">
    <h2>PLAKA SORGU</h2>
    <input type="text" id="plakaInput" placeholder="Örn: 34ABC123" maxlength="10">
    <button onclick="sorgula()">Sorgula</button>

    <table id="veriTablosu">
        <tr><td class="key">İl (Tescil)</td><td class="val" id="v_il">-</td></tr>
        <tr><td class="key">Plaka Türü</td><td class="val" id="v_tur">-</td></tr>
        <tr><td class="key">Bölge</td><td class="val" id="v_bolge">-</td></tr>
    </table>
</div>

function sorgula() {
    const plaka = document.getElementById('plakaInput').value.trim();
    const kod = plaka.substring(0, 2);
    const tablo = document.getElementById('veriTablosu');
    
    if (ilVerileri[kod]) {
        tablo.style.display = 'table';
        document.getElementById('v_il').innerText = ilVerileri[kod].il;
        document.getElementById('v_bolge').innerText = ilVerileri[kod].bolge;
        
        // Basit bir "Tür" mantığı
        let tur = "Standart Sivil Plaka";
        if(kod === '06' && plaka.includes('AA')) tur = "Resmi Makam / Devlet";
        else if(kod === '34' && plaka.length < 6) tur = "Eski Tip / Özel Seri";
        document.getElementById('v_tur').innerText = tur;
    } else {
        alert("Geçerli bir il kodu bulunamadı.");
    }
}
</script>
</body>
</html>
